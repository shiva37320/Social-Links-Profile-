<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  
  <style>
@import url('https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap');
</style>
  
  <title>Social links profile</title>
  
  <link rel="stylesheet" href="style.css">

</head>
<body>
  
  <div class="container">
    <div class="image">
      <img src="avatar-jessica.jpeg" alt="profile_photo"/>
    </div>
    
    <div class="bio">
      <h2>Jessica Randall</h2>
      <h3>London, United Kingdom</h3>
      <p>"Front-end developer and avid reader."</p>
    </div>
    
    <div class="buttons">
      <button type="submit">GitHub</button>
      <button type="submit">Frontend Mentor</button>
      <button type="submit">LinkedIn</button>
      <button type="submit">Twitter</button>
      <button type="submit">Instagram</button>
    </div>
    
  </div>
  
</body>
</html>
